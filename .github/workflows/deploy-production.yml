name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-pages
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production export
        env:
          NEXT_PUBLIC_BASE_PATH: /
          NEXT_PUBLIC_SITE_URL: https://positiv-consult.unterweger.tech
        run: npm run build

      - name: Deploy production to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-preview
          folder: out
